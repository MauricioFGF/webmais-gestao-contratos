services:
  postgres:
    image: postgres:15-alpine
    container_name: webmais-postgres
    environment:
      POSTGRES_USER: webmais
      POSTGRES_PASSWORD: webmais
      POSTGRES_DB: contratos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmais -d contratos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: webmais-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
