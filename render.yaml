databases:
  - name: webmais-postgres
    databaseName: contratos
    user: webmais
    plan: free

services:
  - type: keyvalue
    name: webmais-redis
    plan: free
    ipAllowList: []

  - type: web
    name: webmais-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webmais-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: webmais-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://webmais-frontend.onrender.com

  - type: web
    name: webmais-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://webmais-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
