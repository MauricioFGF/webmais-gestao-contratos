name: Auto Assign

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.1
        with:
          configuration-path: .github/auto_assign.yml
